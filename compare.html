<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diff Checker</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: #0f1117;
    color: #c9d1d9;
    min-height: 100vh;
    padding: 24px;
  }
  h1 {
    text-align: center;
    font-size: 1.5rem;
    font-weight: 600;
    margin-bottom: 24px;
    color: #e6edf3;
  }
  .editor-row {
    display: flex;
    gap: 16px;
    margin-bottom: 20px;
  }
  .editor-col {
    flex: 1;
    display: flex;
    flex-direction: column;
  }
  .editor-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
    min-height: 28px;
  }
  .editor-header label {
    font-size: 0.8rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: #8b949e;
  }
  .btn-json {
    background: #1f6feb;
    color: #fff;
    border: none;
    border-radius: 6px;
    padding: 4px 12px;
    font-size: 0.75rem;
    font-weight: 600;
    cursor: pointer;
    display: none;
    transition: background 0.15s;
  }
  .btn-json:hover { background: #388bfd; }
  .btn-json.visible { display: inline-block; }
  textarea {
    flex: 1;
    min-height: 220px;
    background: #161b22;
    color: #c9d1d9;
    border: 1px solid #30363d;
    border-radius: 8px;
    padding: 14px;
    font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
    font-size: 0.875rem;
    line-height: 1.6;
    resize: vertical;
    outline: none;
    transition: border-color 0.15s;
  }
  textarea:focus { border-color: #58a6ff; }
  .result-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
  }
  .result-header h2 {
    font-size: 1.1rem;
    font-weight: 600;
    color: #e6edf3;
  }
  .result-controls {
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .stats span { font-size: 0.8rem; margin-left: 14px; font-weight: 600; }
  .stats .common  { color: #8b949e; }
  .stats .added   { color: #3fb950; }
  .stats .removed { color: #f85149; }
  .diff-toolbar {
    display: none;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
    flex-wrap: wrap;
    gap: 8px;
  }
  .diff-toolbar.visible { display: flex; }
  .nav-group {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .btn-nav, .btn-bulk {
    background: #21262d;
    color: #c9d1d9;
    border: 1px solid #30363d;
    border-radius: 6px;
    padding: 4px 12px;
    font-size: 0.75rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
  }
  .btn-nav:hover, .btn-bulk:hover {
    background: #30363d;
    border-color: #58a6ff;
  }
  .nav-counter {
    font-size: 0.8rem;
    color: #8b949e;
    min-width: 70px;
    text-align: center;
  }
  /* ─── Stacked-mode result pane ─── */
  #result {
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 8px;
    padding: 16px;
    font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
    font-size: 0.875rem;
    line-height: 1.7;
    min-height: 60px;
  }
  #result:empty::before {
    content: "Start typing to see differences.";
    color: #484f58;
  }
  .line {
    display: block;
    padding: 1px 6px;
    border-radius: 3px;
    white-space: pre-wrap;
    word-break: break-word;
    min-height: 1.4em;
  }
  .line-add { background: rgba(63,185,80,0.15); }
  .line-del { background: rgba(248,81,73,0.15); }
  .line-mod { background: rgba(210,153,34,0.10); }
  .token-add {
    background: rgba(63,185,80,0.35);
    color: #3fb950;
    border-radius: 2px;
  }
  .token-del {
    background: rgba(248,81,73,0.30);
    color: #f85149;
    text-decoration: line-through;
    border-radius: 2px;
  }
  .diff-chunk {
    position: relative;
    border-left: 3px solid #d29922;
    margin: 4px 0;
    padding-left: 8px;
    border-radius: 4px;
    transition: border-color 0.2s, background 0.2s;
  }
  .diff-chunk:hover { background: rgba(210,153,34,0.03); }
  .diff-chunk.active {
    border-left-color: #58a6ff;
    background: rgba(88,166,255,0.05);
  }
  .diff-chunk.resolved { border-left-color: #3fb950; }
  .diff-chunk.resolved .line { background: rgba(63,185,80,0.06); }
  .chunk-actions {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 4px 0 2px;
    opacity: 0.5;
    transition: opacity 0.15s;
  }
  .diff-chunk:hover .chunk-actions,
  .diff-chunk.active .chunk-actions { opacity: 1; }
  .diff-chunk.resolved .chunk-actions { opacity: 0.8; }
  .btn-accept {
    background: #21262d;
    color: #c9d1d9;
    border: 1px solid #30363d;
    border-radius: 4px;
    padding: 2px 10px;
    font-size: 0.7rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s, color 0.15s;
  }
  .btn-accept-left:hover  { border-color: #8b949e; color: #e6edf3; background: #30363d; }
  .btn-accept-right:hover { border-color: #3fb950; color: #3fb950; background: rgba(63,185,80,0.1); }
  .btn-undo:hover         { border-color: #d29922; color: #d29922; background: rgba(210,153,34,0.1); }
  .resolved-label {
    font-size: 0.7rem;
    color: #3fb950;
    font-weight: 600;
  }
  /* ─── Layout toggle ─── */
  .layout-toggle { display: none; }
  .layout-toggle.visible { display: flex; }
  .btn-layout {
    background: #21262d;
    color: #8b949e;
    border: 1px solid #30363d;
    padding: 4px 12px;
    font-size: 0.75rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s, color 0.15s, border-color 0.15s;
  }
  .btn-layout:first-child { border-radius: 6px 0 0 6px; }
  .btn-layout:last-child  { border-radius: 0 6px 6px 0; border-left: none; }
  .btn-layout.active {
    background: #1f6feb;
    color: #fff;
    border-color: #1f6feb;
  }
  .btn-layout.active + .btn-layout { border-left: none; }
  .btn-layout:not(.active):hover {
    background: #30363d;
    color: #c9d1d9;
  }
  /* ─── Side-by-side view ─── */
  .sbs-view {
    display: none;
    border: 1px solid #30363d;
    border-radius: 8px;
    background: #161b22;
    overflow: hidden;
  }
  .result-container.horizontal > .sbs-view { display: block; }
  .result-container.horizontal > #result { display: none; }
  .result-container.horizontal > .merged-section { display: none !important; }
  .sbs-headers {
    display: flex;
    border-bottom: 1px solid #30363d;
  }
  .sbs-hdr {
    flex: 1;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 12px;
    font-size: 0.8rem;
    font-weight: 600;
    color: #8b949e;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .sbs-hdr:first-child { border-right: 1px solid #30363d; }
  .sbs-merge-ctrl {
    display: flex;
    align-items: center;
    gap: 10px;
    text-transform: none;
    letter-spacing: normal;
  }
  .sbs-scroll {
    max-height: 75vh;
    overflow: auto;
  }
  .sbs-scroll::-webkit-scrollbar { width: 6px; height: 6px; }
  .sbs-scroll::-webkit-scrollbar-track { background: transparent; }
  .sbs-scroll::-webkit-scrollbar-thumb { background: #30363d; border-radius: 3px; }
  .sbs-grid {
    display: grid;
    grid-template-columns: auto 1fr auto 1fr;
    font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
    font-size: 0.875rem;
    line-height: 1.7;
  }
  .sbs-ln {
    padding: 0 8px 0 4px;
    text-align: right;
    color: #484f58;
    user-select: none;
    min-width: 32px;
    white-space: nowrap;
  }
  .sbs-ln-r { border-left: 1px solid #30363d; }
  .sbs-cell {
    padding: 0 8px;
    white-space: pre-wrap;
    word-break: break-word;
    min-height: 1.4em;
  }
  .sbs-spacer { background: rgba(110, 118, 129, 0.04); }
  .sbs-edge { border-left: 3px solid #d29922; padding-left: 1px; }
  .sbs-edge.sbs-diff-done { border-left-color: #3fb950; }
  .sbs-edge.sbs-diff-on { border-left-color: #58a6ff; }
  .sbs-actions {
    grid-column: 1 / -1;
    padding: 4px 8px 2px;
    display: flex;
    align-items: center;
    gap: 6px;
    border-left: 3px solid #d29922;
  }
  .sbs-actions.sbs-diff-done { border-left-color: #3fb950; }
  .sbs-actions.sbs-diff-on  { border-left-color: #58a6ff; background: rgba(88,166,255,0.05); }
  /* ─── Stacked-mode merged section ─── */
  .merged-section {
    margin-top: 28px;
    display: none;
  }
  .merged-section.visible { display: block; }
  .merged-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
  }
  .merged-header h2 {
    font-size: 1.1rem;
    font-weight: 600;
    color: #e6edf3;
  }
  .merge-info {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .merge-status {
    font-size: 0.8rem;
    color: #8b949e;
    font-weight: 600;
  }
  .btn-copy {
    background: #238636;
    color: #fff;
    border: none;
    border-radius: 6px;
    padding: 4px 14px;
    font-size: 0.75rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s;
  }
  .btn-copy:hover { background: #2ea043; }
  #mergedResult {
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 8px;
    padding: 16px;
    font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
    font-size: 0.875rem;
    line-height: 1.7;
    min-height: 60px;
    white-space: pre-wrap;
    word-break: break-word;
    color: #c9d1d9;
  }
  /* ─── Floating nav ─── */
  .nav-float {
    position: fixed;
    top: 12px;
    z-index: 100;
    display: flex;
    align-items: center;
    gap: 6px;
    background: rgba(22, 27, 34, 0.92);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border: 1px solid #30363d;
    border-radius: 8px;
    padding: 6px 12px;
    box-shadow: 0 4px 16px rgba(0, 0, 0, 0.45);
    opacity: 0;
    pointer-events: none;
    transform: translateY(-8px);
    transition: opacity 0.2s, transform 0.2s;
  }
  .nav-float.visible {
    opacity: 1;
    pointer-events: auto;
    transform: translateY(0);
  }
  @media (max-width: 700px) {
    .editor-row { flex-direction: column; }
    .diff-toolbar { flex-direction: column; align-items: flex-start; }
    .sbs-scroll { max-height: none; }
  }
</style>
</head>
<body>
<h1>Diff Checker</h1>
<div class="editor-row">
  <div class="editor-col">
    <div class="editor-header">
      <label>Original text</label>
      <button class="btn-json" id="btnJsonA">FORMAT JSON</button>
    </div>
    <textarea id="textA" spellcheck="false" placeholder="Paste or type the original text here…"></textarea>
  </div>
  <div class="editor-col">
    <div class="editor-header">
      <label>Compared text</label>
      <button class="btn-json" id="btnJsonB">FORMAT JSON</button>
    </div>
    <textarea id="textB" spellcheck="false" placeholder="Paste or type the modified text here…"></textarea>
  </div>
</div>
<div class="result-header">
  <h2>Comparison result</h2>
  <div class="result-controls">
    <div class="stats" id="stats"></div>
    <div class="layout-toggle" id="layoutToggle">
      <button class="btn-layout active" data-layout="vertical">Stacked</button>
      <button class="btn-layout" data-layout="horizontal">Side by Side</button>
    </div>
  </div>
</div>
<div class="diff-toolbar" id="diffToolbar">
  <div class="nav-group">
    <button class="btn-nav" id="btnPrev" title="Previous change (Shift+F7)">↑ Prev</button>
    <button class="btn-nav" id="btnNext" title="Next change (F7)">↓ Next</button>
    <span class="nav-counter" id="navCounter"></span>
  </div>
  <div class="nav-group">
    <button class="btn-bulk" id="btnAllLeft">Accept All Original</button>
    <button class="btn-bulk" id="btnAllRight">Accept All Modified</button>
    <button class="btn-bulk" id="btnReset">Reset All</button>
  </div>
</div>
<div class="result-container" id="resultContainer">
  <div id="result"></div>
  <div class="sbs-view" id="sbsView">
    <div class="sbs-headers">
      <div class="sbs-hdr">Comparison Result</div>
      <div class="sbs-hdr">
        <span>Merged Result</span>
        <div class="sbs-merge-ctrl">
          <span class="merge-status" id="sbsMergeStatus"></span>
          <button class="btn-copy" id="sbsCopy">Copy</button>
        </div>
      </div>
    </div>
    <div class="sbs-scroll" id="sbsScroll">
      <div class="sbs-grid" id="sbsGrid"></div>
    </div>
  </div>
  <div class="merged-section" id="mergedSection">
    <div class="merged-header">
      <h2>Merged Result</h2>
      <div class="merge-info">
        <span class="merge-status" id="mergeStatus"></span>
        <button class="btn-copy" id="btnCopy">Copy Result</button>
      </div>
    </div>
    <div id="mergedResult"></div>
  </div>
</div>
<div class="nav-float" id="navFloat">
  <button class="btn-nav" id="btnPrevFloat" title="Previous change (Shift+F7)">↑ Prev</button>
  <button class="btn-nav" id="btnNextFloat" title="Next change (F7)">↓ Next</button>
  <span class="nav-counter" id="navCounterFloat"></span>
</div>
<script>
(function () {
  var textA   = document.getElementById('textA');
  var textB   = document.getElementById('textB');
  var result  = document.getElementById('result');
  var statsEl = document.getElementById('stats');
  var btnA    = document.getElementById('btnJsonA');
  var btnB    = document.getElementById('btnJsonB');
  var toolbar       = document.getElementById('diffToolbar');
  var navCounter    = document.getElementById('navCounter');
  var btnPrev       = document.getElementById('btnPrev');
  var btnNext       = document.getElementById('btnNext');
  var btnAllLeft    = document.getElementById('btnAllLeft');
  var btnAllRight   = document.getElementById('btnAllRight');
  var btnReset      = document.getElementById('btnReset');
  var mergedSection    = document.getElementById('mergedSection');
  var mergedResult     = document.getElementById('mergedResult');
  var mergeStatusEl    = document.getElementById('mergeStatus');
  var btnCopy          = document.getElementById('btnCopy');
  var navFloat         = document.getElementById('navFloat');
  var navCounterFloat  = document.getElementById('navCounterFloat');
  var btnPrevFloat     = document.getElementById('btnPrevFloat');
  var btnNextFloat     = document.getElementById('btnNextFloat');
  var layoutToggle     = document.getElementById('layoutToggle');
  var resultContainer  = document.getElementById('resultContainer');
  var sbsView          = document.getElementById('sbsView');
  var sbsGrid          = document.getElementById('sbsGrid');
  var sbsScroll        = document.getElementById('sbsScroll');
  var sbsMergeStatusEl = document.getElementById('sbsMergeStatus');
  var sbsCopyBtn       = document.getElementById('sbsCopy');
  var chunks = [];
  var diffChunkIndices = [];
  var activeChunkPos = -1;
  var sbsMergedText = '';
  var timer = null;
  function schedule() {
    clearTimeout(timer);
    timer = setTimeout(compare, 150);
  }
  textA.addEventListener('input', schedule);
  textB.addEventListener('input', schedule);
  function looksLikeJSON(str) {
    var s = str.trim();
    if (!s) return false;
    if (s[0] !== '{' && s[0] !== '[') return false;
    try { JSON.parse(s); return true; } catch (e) { return false; }
  }
  function formatJSON(el) {
    try {
      el.value = JSON.stringify(JSON.parse(el.value.trim()), null, 2);
      schedule();
    } catch (e) { /* ignore */ }
  }
  btnA.addEventListener('click', function () { formatJSON(textA); });
  btnB.addEventListener('click', function () { formatJSON(textB); });
  function refreshJSONButtons() {
    btnA.classList.toggle('visible', looksLikeJSON(textA.value));
    btnB.classList.toggle('visible', looksLikeJSON(textB.value));
  }
  /* ─── LCS line diff ─── */
  function diffLines(a, b) {
    var n = a.length, m = b.length;
    var prefix = 0;
    while (prefix < n && prefix < m && a[prefix] === b[prefix]) prefix++;
    var suffix = 0;
    while (suffix < n - prefix && suffix < m - prefix &&
           a[n - 1 - suffix] === b[m - 1 - suffix]) suffix++;
    var as = a.slice(prefix, n - suffix);
    var bs = b.slice(prefix, m - suffix);
    var sn = as.length, sm = bs.length;
    var dp = new Array(sn + 1);
    for (var i = 0; i <= sn; i++) { dp[i] = new Array(sm + 1); dp[i][0] = 0; }
    for (var j = 0; j <= sm; j++) dp[0][j] = 0;
    for (var i = 1; i <= sn; i++)
      for (var j = 1; j <= sm; j++)
        dp[i][j] = as[i - 1] === bs[j - 1]
          ? dp[i - 1][j - 1] + 1
          : (dp[i - 1][j] > dp[i][j - 1] ? dp[i - 1][j] : dp[i][j - 1]);
    var ops = [];
    var i = sn, j = sm;
    while (i > 0 || j > 0) {
      if (i > 0 && j > 0 && as[i - 1] === bs[j - 1]) {
        ops.push({ type: 'equal', a: prefix + i - 1, b: prefix + j - 1 });
        i--; j--;
      } else if (j > 0 && (i === 0 || dp[i][j - 1] >= dp[i - 1][j])) {
        ops.push({ type: 'insert', b: prefix + j - 1 });
        j--;
      } else {
        ops.push({ type: 'delete', a: prefix + i - 1 });
        i--;
      }
    }
    ops.reverse();
    var pre = [];
    for (var p = 0; p < prefix; p++) pre.push({ type: 'equal', a: p, b: p });
    var suf = [];
    for (var s = 0; s < suffix; s++) suf.push({ type: 'equal', a: n - suffix + s, b: m - suffix + s });
    return pre.concat(ops, suf);
  }
  /* ─── Token-level diff ─── */
  function diffTokens(s1, s2) {
    var w1 = tokenize(s1), w2 = tokenize(s2);
    var n = w1.length, m = w2.length;
    var dp = new Array(n + 1);
    for (var i = 0; i <= n; i++) { dp[i] = new Array(m + 1); dp[i][0] = 0; }
    for (var j = 0; j <= m; j++) dp[0][j] = 0;
    for (var i = 1; i <= n; i++)
      for (var j = 1; j <= m; j++)
        dp[i][j] = w1[i - 1] === w2[j - 1]
          ? dp[i - 1][j - 1] + 1
          : (dp[i - 1][j] > dp[i][j - 1] ? dp[i - 1][j] : dp[i][j - 1]);
    var out = [];
    var i = n, j = m;
    while (i > 0 || j > 0) {
      if (i > 0 && j > 0 && w1[i - 1] === w2[j - 1]) {
        out.push({ type: 'equal', text: w1[i - 1] });
        i--; j--;
      } else if (j > 0 && (i === 0 || dp[i][j - 1] >= dp[i - 1][j])) {
        out.push({ type: 'add', text: w2[j - 1] });
        j--;
      } else {
        out.push({ type: 'del', text: w1[i - 1] });
        i--;
      }
    }
    out.reverse();
    return out;
  }
  function tokenize(s) { return s.match(/\w+|[^\w\s]|\s+/g) || []; }
  function esc(s) {
    return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }
  /* ─── Compare (builds chunk model) ─── */
  function compare() {
    refreshJSONButtons();
    var a = textA.value, b = textB.value;
    if (!a && !b) {
      result.innerHTML = '';
      sbsGrid.innerHTML = '';
      statsEl.innerHTML = '';
      toolbar.classList.remove('visible');
      mergedSection.classList.remove('visible');
      navFloat.classList.remove('visible');
      layoutToggle.classList.remove('visible');
      chunks = [];
      diffChunkIndices = [];
      activeChunkPos = -1;
      sbsMergedText = '';
      return;
    }
    var linesA = a.split('\n');
    var linesB = b.split('\n');
    var ops = diffLines(linesA, linesB);
    chunks = [];
    diffChunkIndices = [];
    activeChunkPos = -1;
    var i = 0;
    while (i < ops.length) {
      if (ops[i].type === 'equal') {
        var eq = [];
        while (i < ops.length && ops[i].type === 'equal') {
          eq.push(linesA[ops[i].a]);
          i++;
        }
        chunks.push({ type: 'equal', lines: eq });
      } else {
        var dels = [], ins = [];
        while (i < ops.length && ops[i].type !== 'equal') {
          if (ops[i].type === 'delete') dels.push(linesA[ops[i].a]);
          else ins.push(linesB[ops[i].b]);
          i++;
        }
        diffChunkIndices.push(chunks.length);
        chunks.push({ type: 'diff', originalLines: dels, modifiedLines: ins, resolved: null });
      }
    }
    render();
    updateToolbar();
  }
  function render() { renderDiff(); }
  /* ─── Render stacked diff view ─── */
  function renderDiff() {
    var html = '';
    var cntCommon = 0, cntAdded = 0, cntRemoved = 0;
    for (var c = 0; c < chunks.length; c++) {
      var chunk = chunks[c];
      if (chunk.type === 'equal') {
        for (var l = 0; l < chunk.lines.length; l++)
          html += '<span class="line">' + esc(chunk.lines[l]) + '</span>';
        cntCommon += chunk.lines.length;
        continue;
      }
      var di = diffChunkIndices.indexOf(c);
      var cls = 'diff-chunk';
      if (di === activeChunkPos) cls += ' active';
      if (chunk.resolved) cls += ' resolved';
      html += '<div class="' + cls + '" data-chunk="' + di + '">';
      html += '<div class="chunk-actions">';
      if (chunk.resolved) {
        var label = chunk.resolved === 'left' ? 'Kept original' : 'Used modified';
        html += '<span class="resolved-label">' + label + '</span>';
        html += '<button class="btn-accept btn-undo" data-action="undo">↩ Undo</button>';
      } else {
        html += '<button class="btn-accept btn-accept-left" data-action="left">← Keep Original</button>';
        html += '<button class="btn-accept btn-accept-right" data-action="right">Use Modified →</button>';
      }
      html += '</div>';
      if (chunk.resolved === 'left') {
        for (var l = 0; l < chunk.originalLines.length; l++)
          html += '<span class="line">' + esc(chunk.originalLines[l]) + '</span>';
      } else if (chunk.resolved === 'right') {
        for (var l = 0; l < chunk.modifiedLines.length; l++)
          html += '<span class="line">' + esc(chunk.modifiedLines[l]) + '</span>';
      } else {
        var dels = chunk.originalLines, ins = chunk.modifiedLines;
        var paired = Math.min(dels.length, ins.length);
        for (var p = 0; p < paired; p++) {
          var tokens = diffTokens(dels[p], ins[p]);
          var lh = '';
          for (var t = 0; t < tokens.length; t++) {
            if (tokens[t].type === 'equal')    lh += esc(tokens[t].text);
            else if (tokens[t].type === 'del') lh += '<span class="token-del">' + esc(tokens[t].text) + '</span>';
            else                               lh += '<span class="token-add">' + esc(tokens[t].text) + '</span>';
          }
          html += '<span class="line line-mod">' + lh + '</span>';
          cntRemoved++;
          cntAdded++;
        }
        for (var d = paired; d < dels.length; d++) {
          html += '<span class="line line-del"><span class="token-del">' + esc(dels[d]) + '</span></span>';
          cntRemoved++;
        }
        for (var k = paired; k < ins.length; k++) {
          html += '<span class="line line-add"><span class="token-add">' + esc(ins[k]) + '</span></span>';
          cntAdded++;
        }
      }
      html += '</div>';
    }
    result.innerHTML = html;
    setStats(cntCommon, cntAdded, cntRemoved);
  }
  function setStats(common, added, removed) {
    statsEl.innerHTML =
      '<span class="common">Common: ' + common + '</span>' +
      '<span class="added">Added: ' + added + '</span>' +
      '<span class="removed">Removed: ' + removed + '</span>';
  }
  /* ─── Navigation ─── */
  function updateToolbar() {
    var has = diffChunkIndices.length > 0;
    toolbar.classList.toggle('visible', has);
    mergedSection.classList.toggle('visible', has);
    layoutToggle.classList.toggle('visible', has);
    updateNavCounter();
  }
  function updateNavCounter() {
    var total = diffChunkIndices.length;
    if (!total) return;
    var text;
    if (activeChunkPos < 0)
      text = total + ' change' + (total !== 1 ? 's' : '');
    else
      text = (activeChunkPos + 1) + ' / ' + total;
    navCounter.textContent = text;
    navCounterFloat.textContent = text;
  }
  function goToChunk(pos) {
    if (!diffChunkIndices.length) return;
    if (pos < 0) pos = diffChunkIndices.length - 1;
    if (pos >= diffChunkIndices.length) pos = 0;
    activeChunkPos = pos;
    if (currentLayout === 'horizontal') {
      var old = sbsGrid.querySelectorAll('.sbs-diff-on');
      for (var i = 0; i < old.length; i++) old[i].classList.remove('sbs-diff-on');
      var edges = sbsGrid.querySelectorAll('[data-cid="' + pos + '"]');
      for (var i = 0; i < edges.length; i++) edges[i].classList.add('sbs-diff-on');
      var actRow = sbsGrid.querySelector('.sbs-actions[data-chunk="' + pos + '"]');
      if (actRow) {
        actRow.classList.add('sbs-diff-on');
        actRow.scrollIntoView({ behavior: 'smooth', block: 'center' });
      }
    } else {
      var old = result.querySelector('.diff-chunk.active');
      if (old) old.classList.remove('active');
      var el = result.querySelector('[data-chunk="' + pos + '"]');
      if (el) {
        el.classList.add('active');
        el.scrollIntoView({ behavior: 'smooth', block: 'center' });
      }
    }
    updateNavCounter();
  }
  function prevChunk() { goToChunk(activeChunkPos <= 0 ? diffChunkIndices.length - 1 : activeChunkPos - 1); }
  function nextChunk() { goToChunk(activeChunkPos < 0 ? 0 : (activeChunkPos + 1) % diffChunkIndices.length); }
  btnPrev.addEventListener('click', prevChunk);
  btnNext.addEventListener('click', nextChunk);
})();
</script>
</body>
</html>
